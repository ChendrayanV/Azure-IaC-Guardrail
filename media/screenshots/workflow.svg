<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="620" viewBox="0 0 1440 620" role="img" aria-labelledby="title description">
  <title id="title">Azure IaC Guardrail workflow</title>
  <description id="description">Four-step workflow from opening Terraform through reviewing and exporting compliance results.</description>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#10243d"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1683ff"/>
      <stop offset=".5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1440" height="620" rx="28" fill="url(#background)"/>
  <circle cx="150" cy="70" r="180" fill="#1683ff" opacity=".09"/>
  <circle cx="1290" cy="570" r="240" fill="#8b5cf6" opacity=".08"/>
  <text x="720" y="82" text-anchor="middle" fill="#f4f8ff" font-family="Segoe UI, Arial, sans-serif" font-size="34" font-weight="700">From Terraform to review-ready evidence</text>
  <text x="720" y="120" text-anchor="middle" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="18">A guided local workflow inside Visual Studio Code</text>
  <path d="M 270 315 H 1170" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" opacity=".72"/>

  <g filter="url(#shadow)">
    <g transform="translate(70 190)">
      <rect width="280" height="270" rx="20" fill="#111f31" stroke="#2f4f70"/>
      <circle cx="46" cy="46" r="24" fill="#1683ff"/>
      <text x="46" y="54" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">1</text>
      <text x="28" y="112" fill="#f4f8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Open Terraform</text>
      <text x="28" y="150" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">Open the root module that</text>
      <text x="28" y="176" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">contains your .tf files.</text>
      <rect x="28" y="208" width="144" height="34" rx="17" fill="#183b5f"/>
      <text x="100" y="230" text-anchor="middle" fill="#7cc4ff" font-family="Consolas, monospace" font-size="13">main.tf</text>
    </g>
    <g transform="translate(410 190)">
      <rect width="280" height="270" rx="20" fill="#111f31" stroke="#58428b"/>
      <circle cx="46" cy="46" r="24" fill="#8b5cf6"/>
      <text x="46" y="54" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">2</text>
      <text x="28" y="112" fill="#f4f8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Choose scan</text>
      <text x="28" y="150" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">Run a fast static scan or</text>
      <text x="28" y="176" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">create a resolved plan.</text>
      <rect x="28" y="208" width="190" height="34" rx="17" fill="#312654"/>
      <text x="123" y="230" text-anchor="middle" fill="#c4adff" font-family="Segoe UI, Arial, sans-serif" font-size="13">Ctrl+Shift+P</text>
    </g>
    <g transform="translate(750 190)">
      <rect width="280" height="270" rx="20" fill="#111f31" stroke="#287066"/>
      <circle cx="46" cy="46" r="24" fill="#14b8a6"/>
      <text x="46" y="54" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">3</text>
      <text x="28" y="112" fill="#f4f8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Review findings</text>
      <text x="28" y="150" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">Filter outcomes, inspect</text>
      <text x="28" y="176" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">remediation, preview fixes.</text>
      <rect x="28" y="208" width="166" height="34" rx="17" fill="#163f3d"/>
      <text x="111" y="230" text-anchor="middle" fill="#6ee7d7" font-family="Segoe UI, Arial, sans-serif" font-size="13">Action required</text>
    </g>
    <g transform="translate(1090 190)">
      <rect width="280" height="270" rx="20" fill="#111f31" stroke="#8a6431"/>
      <circle cx="46" cy="46" r="24" fill="#f59e0b"/>
      <text x="46" y="54" text-anchor="middle" fill="white" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">4</text>
      <text x="28" y="112" fill="#f4f8ff" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Export evidence</text>
      <text x="28" y="150" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">Create PDF, JSON, and</text>
      <text x="28" y="176" fill="#9fb0c3" font-family="Segoe UI, Arial, sans-serif" font-size="16">Markdown review artifacts.</text>
      <rect x="28" y="208" width="160" height="34" rx="17" fill="#4c3518"/>
      <text x="108" y="230" text-anchor="middle" fill="#ffd27b" font-family="Segoe UI, Arial, sans-serif" font-size="13">Evidence pack</text>
    </g>
  </g>
</svg>
