name: Bug report
description: Report incorrect behavior or a regression
title: "[Bug]: "
labels: ["bug", "status: discovery"]
body:
  - type: markdown
    attributes:
      value: "Do not include secrets, Terraform state, plan files, tenant IDs, or subscription IDs."
  - type: input
    id: version
    attributes:
      label: Extension version
      placeholder: 0.1.0
    validations:
      required: true
  - type: dropdown
    id: scan
    attributes:
      label: Scan mode
      options: [Static scan, Local plan scan, Existing plan scan, Sketch Your Infra, Export]
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and safe reproduction steps
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: VS Code, Terraform, AzureRM provider, and operating-system versions.