name: Feature request
description: Propose a measurable product improvement
title: "[Feature]: "
labels: ["enhancement", "status: discovery"]
body:
  - type: textarea
    id: problem
    attributes:
      label: User problem
      description: Who has the problem, and what outcome is blocked?
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      placeholder: "- [ ] Observable behavior..."
  - type: dropdown
    id: priority
    attributes:
      label: Suggested priority
      options: [Critical, High, Medium, Low]