name: Extension CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: extension-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate and package
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Terraform identifiers
        run: npm run check:terraform-identifiers

      - name: Type check
        run: npm run check

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

      - name: Compile extension
        run: npm run compile

      - name: Package VSIX
        run: npx vsce package --out azure-iac-guardrail-ci.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: azure-iac-guardrail-vsix
          path: azure-iac-guardrail-ci.vsix
          if-no-files-found: error
          retention-days: 14
